<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KataKita Kota Serang</title>
  <link rel="icon" href="https://drive.google.com/thumbnail?id=1fmmwR8gpdyfT_K3W7B620AKKgJFTNcPs&sz=w1000" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow: hidden; /* Mencegah scroll ganda */
    }

    .iframe-container {
      width: 100%;
      height: 100dvh; /* Menggunakan dvh agar pas di mobile browser */
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycby770aLnng7fXt7-sQ3zQJYfXpR6FWMrPidZLQI61orrhpWpOlX8HpB_X6-SAiFjftiFQ/exec"
      scrolling="yes"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation;">
    </iframe>
  </div>
  <script>
    function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPassword').value;
  
  showLoader('Verifikasi Akun...');

  auth.signInWithEmailAndPassword(email, pass)
    .then((userCredential) => {
      showLoader('Mengalihkan ke Dashboard...');
      
      // GANTI URL DI BAWAH INI DENGAN URL WEB APP GOOGLE SCRIPT ANDA
      const webAppUrl = "https://script.google.com/macros/s/XXXXX/exec"; 
      
      // Mengarahkan ke Web App dengan parameter admin
      window.location.href = webAppUrl + "?page=admin";
    })
    .catch((error) => {
      hideLoader();
      const errEl = document.getElementById('loginError');
      errEl.innerText = error.message;
      errEl.classList.remove('hidden');
    });
}
  </script>
</body>
</html>
